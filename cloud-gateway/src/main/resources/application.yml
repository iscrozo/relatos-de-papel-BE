server:
  port: ${PORT:8080}

spring:
  application:
    name: cloud-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
              - "https://*.railway.app"
              - "https://*.vercel.app"
              - "https://*.netlify.app"
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: ms-books-catalogue
          uri: lb://ms-books-catalogue
          predicates:
            - Path=/api/books/**
          filters:
            - StripPrefix=0
        
        - id: ms-books-catalogue-files
          uri: lb://ms-books-catalogue
          predicates:
            - Path=/api/files/**
          filters:
            - StripPrefix=0
        
        - id: ms-books-catalogue-uploads
          uri: lb://ms-books-catalogue
          predicates:
            - Path=/uploads/**
          filters:
            - StripPrefix=0
        
        - id: ms-books-payments
          uri: lb://ms-books-payments
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=0

        - id: ms-users
          uri: lb://ms-users
          predicates:
            - Path=/api/login, /api/register, /api/auth/**, /api/users/**
          filters:
            - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,routes,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.relatosdepapel.gateway: DEBUG